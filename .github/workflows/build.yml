name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run shared unit tests
        run: ./gradlew :shared:test --no-daemon --stacktrace

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with llama.cpp submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache native build (CMake / llama.cpp)
        uses: actions/cache@v4
        with:
          path: |
            shared/.cxx
            shared/build/intermediates/cxx
          key: ${{ runner.os }}-cxx-${{ hashFiles('shared/src/androidMain/cpp/**', '.gitmodules') }}
          restore-keys: |
            ${{ runner.os }}-cxx-

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace

      - name: Build release APK (debug-signed fallback)
        run: ./gradlew :androidApp:assembleRelease --no-daemon --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: finance-slm-apks
          path: |
            androidApp/build/outputs/apk/debug/*.apk
            androidApp/build/outputs/apk/release/*.apk
          if-no-files-found: warn
